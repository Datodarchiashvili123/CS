<!doctype html>
<html lang="ka">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Computer From Zero</title>
    <link rel="stylesheet" href="style.css?v=11" />
  </head>
  <body>
    <header class="top-bar">
      <div>
        <p class="course-name">Computer From Zero</p>
        <h1>კომპიუტერი ნულიდან</h1>
      </div>
      <p class="lesson-counter" id="lessonCounter">გაკვეთილი 1 / 10</p>
    </header>

    <main class="app-shell">
      <aside class="lesson-sidebar" aria-label="გაკვეთილების სია">
        <div class="progress-summary">
          <div
            class="progress-track"
            role="progressbar"
            aria-label="კურსის პროგრესი"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            id="progressTrack"
          >
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <p class="progress-caption" id="progressCaption">0 / 0 დასრულებული</p>
          <button type="button" class="progress-reset" id="progressReset">პროგრესის განულება</button>
        </div>
        <ol id="lessonList" class="lesson-list"></ol>
      </aside>

      <section id="lessonRoot" class="lesson-root" aria-live="polite"></section>
    </main>

    <script src="lessons/electricity.js?v=11" defer></script>
    <script src="lessons/binary.js?v=11" defer></script>
    <script src="lessons/transistor.js?v=11" defer></script>
    <script src="lessons/not-gate.js?v=11" defer></script>
    <script src="lessons/and-gate.js?v=11" defer></script>
    <script src="lessons/or-gate.js?v=11" defer></script>
    <script src="lessons/xor-gate.js?v=11" defer></script>
    <script src="lessons/half-adder.js?v=11" defer></script>
    <script src="lessons/full-adder.js?v=11" defer></script>
    <script src="lessons/memory.js?v=11" defer></script>
    <script src="lessons/alu.js?v=11" defer></script>
    <script src="lessons/cpu.js?v=11" defer></script>
    <script src="lessons/program.js?v=11" defer></script>
    <script src="lessons/cache.js?v=11" defer></script>
    <script src="lessons/recap.js?v=11" defer></script>
    <script src="app.js?v=11" defer></script>
  </body>
</html>
